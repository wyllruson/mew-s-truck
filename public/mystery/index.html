<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Mystery Shop</title>
	<meta name="description" content="Buy a $5 mystery Pokémon card at Mew's Truck.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../assets/styles/layout.css">
	<link rel="stylesheet" href="../assets/styles/components.css">
	<link rel="stylesheet" href="../assets/styles/pages/mystery.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../assets/scripts/config/site-config.js"></script>
	<script src="../assets/scripts/core/site-scroll-restore.js"></script>
	<script src="../assets/scripts/config/supabase-config.js"></script>
	<script src="../assets/scripts/core/site-modal.js"></script>
	<script src="../assets/scripts/core/site-message.js"></script>
	<script src="../assets/scripts/core/site-utils.js"></script>
	<script src="../assets/scripts/core/mew-api.js"></script>
	<script type="module" src="../assets/scripts/config/supabase-init.js"></script>
	<script src="../assets/scripts/core/site-header.js" defer></script>
	<script src="../assets/scripts/core/site-footer.js" defer></script>
	<script src="../assets/scripts/pages/mystery.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<section class="mystery-shop">
		<div class="bg-blur">
			<div class="popup-box popup-box--hero">
				<p>
					Welcome to the Mystery Shop! The shop resets every Monday. Buy a mystery
					card and test your luck! 🔻
				</p>
			</div>
			<div class="layout">
				<div class="ad-box ad-box--left">
					Ad
					<img src="https://media.giphy.com/media/LNVqVKjpkRtyYw5hEE/giphy.gif" alt="Promotional GIF">
				</div>
				<div class="mystery-card">
					<div class="mystery-card-face" role="img" aria-label="Mystery Card"></div>
					<p class="mystery-card-title">Mystery Card</p>
					<p>$5</p>
					<button id="buy-mystery-card" type="button">Purchase</button>
				</div>
				<div class="ad-box ad-box--right">
					Ad
					<img src="https://media.giphy.com/media/BMttjVOtkttoDDiSFA/giphy.gif" alt="Promotional GIF">
				</div>
			</div>
		</div>
	</section>

	<div id="mystery-confirmation" class="mystery-confirmation" hidden>
		<div class="mystery-confirmation__backdrop" data-close-mystery-confirmation></div>
		<div class="mystery-confirmation__panel popup-box" role="dialog" aria-modal="true" aria-labelledby="mystery-confirmation-title">
			<h2 id="mystery-confirmation-title">Mystery Card Secured</h2>
			<p id="mystery-confirmation-message" class="mystery-confirmation__message">
				Your mystery card was sent to cart and stays hidden until checkout.
			</p>
			<div class="mystery-confirmation__actions">
				<a id="mystery-confirmation-primary" class="mystery-confirmation__btn mystery-confirmation__btn--primary" href="../cart/">Go to Cart</a>
				<button id="mystery-confirmation-secondary" class="mystery-confirmation__btn mystery-confirmation__btn--ghost" type="button" data-close-mystery-confirmation>Keep Browsing</button>
			</div>
		</div>
	</div>

	<footer id="site-footer"></footer>
</body>
</html>
