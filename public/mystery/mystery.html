<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Mystery Shop</title>
	<meta name="description" content="Buy a $5 mystery Pokémon card at Mew's Truck.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../css/layout.css">
	<link rel="stylesheet" href="../css/components.css">
	<link rel="stylesheet" href="mystery.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../js/site-config.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/mew-api.js"></script>
	<script type="module" src="../js/supabase-init.js"></script>
	<script src="../js/site-header.js" defer></script>
	<script src="mystery.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<section class="mysteryShop">
		<div class="bgBlur">
			<div class="main-content">
				<div class="popup-box">
					Welcome to the Mystery Shop! The shop resets every week. Buy a mystery
					card and test your luck! 🔻
				</div>
				<div class="layout">
					<div class="ad-box">
						Ad
						<img src="https://media.giphy.com/media/LNVqVKjpkRtyYw5hEE/giphy.gif" alt="Promotional GIF">
					</div>
					<div class="mystery-card">
						<img src="../media/site_design_imgs/backsidecard.png" alt="Mystery Card">
						<p class="mystery-card-title">Mystery Card</p>
						<p>$5</p>
						<button id="buyMysteryCard" class="buy-button" type="button">Purchase</button>
					</div>
					<div class="ad-box">
						Ad
						<img src="https://media.giphy.com/media/BMttjVOtkttoDDiSFA/giphy.gif" alt="Promotional GIF">
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
