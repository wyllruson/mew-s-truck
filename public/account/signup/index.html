<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Sign Up</title>
	<meta name="description" content="Create an account at Mew's Truck.">
	<link rel="icon" href="../../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../../assets/styles/layout.css">
	<link rel="stylesheet" href="../../assets/styles/components.css">
	<link rel="stylesheet" href="../../assets/styles/forms.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../../assets/scripts/config/site-config.js"></script>
	<script src="../../assets/scripts/core/site-scroll-restore.js"></script>
	<script src="../../assets/scripts/config/supabase-config.js"></script>
	<script src="../../assets/scripts/core/site-modal.js"></script>
	<script src="../../assets/scripts/core/site-message.js"></script>
	<script src="../../assets/scripts/core/mew-api.js"></script>
	<script type="module" src="../../assets/scripts/config/supabase-init.js"></script>
	<script src="../../assets/scripts/core/site-header.js" defer></script>
	<script src="../../assets/scripts/core/site-footer.js" defer></script>
	<script src="../../assets/scripts/auth/auth-form-feedback.js" defer></script>
	<script src="../../assets/scripts/pages/signup.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<div class="popup-box">
		<h3>Create account</h3>
		<form class="auth-form signup-form">
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" placeholder="mewcollector" required minlength="2" maxlength="32" autocomplete="username">
				<p class="form-hint">2–32 characters</p>
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" placeholder="Enter a new password" required minlength="8" autocomplete="new-password">
				<ul class="form-hint form-hint-list" aria-live="polite">
					<li>At least 8 characters</li>
				</ul>
			</div>
			<div class="form-group">
				<label for="confirm-password">Confirm your password</label>
				<input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter new password" required minlength="8" autocomplete="new-password">
			</div>
			<div class="form-buttons">
				<button type="submit" class="btn-primary">Create account</button>
			</div>
			<p class="auth-switch">
				Already have an account?
				<a href="../login/">Log in</a>
			</p>
		</form>
	</div>

	<footer id="site-footer"></footer>
</body>
</html>
