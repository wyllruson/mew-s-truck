<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Account</title>
	<meta name="description" content="Manage your Mew's Truck account and order history.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../css/layout.css">
	<link rel="stylesheet" href="../css/components.css">
	<link rel="stylesheet" href="account.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../js/site-config.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/mew-api.js"></script>
	<script type="module" src="../js/supabase-init.js"></script>
	<script src="../js/site-header.js" defer></script>
	<script src="account.js" defer></script></head>
<body>
	<header id="site-header"></header>

	<section>
		<div class="account-container">
			<h1>Account Information</h1>
			<div class="account-details">
				<h2>Your Details</h2>
				<p><strong>Username:</strong> <span id="username">Loading...</span></p>
				<p><strong>Email:</strong> <span id="email">Loading...</span></p>
				<button id="logout-btn" type="button">Logout</button>
			</div>
			<div class="recent-orders">
				<h2>Recent Purchases</h2>
				<ul id="orders-list">
					<li>Loading recent purchases...</li>
				</ul>
				<button id="load-more-btn" type="button">Load More</button>
			</div>
		</div>
	</section>
</body>
</html>
