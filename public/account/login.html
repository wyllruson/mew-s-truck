<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Login</title>
	<meta name="description" content="Log in to your Mew's Truck account.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../css/layout.css">
	<link rel="stylesheet" href="../css/components.css">
	<link rel="stylesheet" href="../css/forms.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../js/site-config.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/mew-api.js"></script>
	<script type="module" src="../js/supabase-init.js"></script>
	<script src="../js/site-header.js" defer></script>
	<script src="login.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<div class="popup-box">
		<h3>Login</h3>
		<form class="auth-form login-form">
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" placeholder="Enter your username" required>
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" placeholder="Enter your password" required>
			</div>
			<div class="form-buttons">
				<button type="submit" class="login-btn">Login</button>
				<button type="button" class="signup-btn" id="go-to-signup">Sign up</button>
			</div>
		</form>
	</div>
</body>
</html>
