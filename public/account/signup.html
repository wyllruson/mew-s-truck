<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Sign Up</title>
	<meta name="description" content="Create an account at Mew's Truck.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../css/layout.css">
	<link rel="stylesheet" href="../css/components.css">
	<link rel="stylesheet" href="../css/forms.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../js/site-config.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/mew-api.js"></script>
	<script type="module" src="../js/supabase-init.js"></script>
	<script src="../js/site-header.js" defer></script>
	<script src="signup.js" defer></script></head>
<body>
	<header id="site-header"></header>

	<div class="popup-box">
		<h3>Sign up</h3>
		<form class="auth-form signup-form">
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" placeholder="Enter your username" required>
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="Enter your email" required>
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" placeholder="Enter your password" required minlength="8">
			</div>
			<div class="form-group">
				<label for="confirm_password">Confirm your password</label>
				<input type="password" id="confirm_password" name="confirm_password" placeholder="Enter your password again" required>
			</div>
			<div class="form-buttons">
				<button type="submit" class="signup-btn">Sign up</button>
				<button type="button" class="back-btn" id="back-to-login">Back</button>
			</div>
		</form>
	</div>
</body>
</html>
