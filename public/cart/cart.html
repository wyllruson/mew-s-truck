<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck — Cart</title>
	<meta name="description" content="View and checkout items in your Mew's Truck cart.">
	<link rel="icon" href="../favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../css/layout.css">
	<link rel="stylesheet" href="../css/components.css">
	<link rel="stylesheet" href="cart.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="../js/site-config.js"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/mew-api.js"></script>
	<script type="module" src="../js/supabase-init.js"></script>
	<script src="../js/site-header.js" defer></script>
	<script src="cart.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<div class="main-content">
		<h3>Your Cart</h3>
		<div class="cart-table">
			<div class="cart-header">
				<span>Items</span>
				<span>Amount</span>
				<span>Price</span>
			</div>
		</div>
		<div class="cart-summary">
			<div class="subtotal">
				<span>Subtotal</span>
				<span>$0.00</span>
			</div>
			<p>Taxes and shipping calculated at checkout</p>
			<button type="button">Check out</button>
		</div>
	</div>
</body>
</html>
