<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mew's Truck</title>
	<meta name="description" content="Pokémon Boundaries Crossed trading card shop with cart, mystery packs, and account features.">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/components.css">
	<link rel="stylesheet" href="css/home.css">
	<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous"></script>
	<script src="js/site-config.js"></script>
	<script src="js/supabase-config.js"></script>
	<script src="js/mew-api.js"></script>
	<script type="module" src="js/supabase-init.js"></script>
	<script src="js/site-header.js" defer></script>
	<script src="js/home.js" defer></script>
</head>
<body>
	<header id="site-header"></header>

	<section id="storefront">
		<div class="popup-box">
			<p>Welcome to Mew's Truck! Have a look around...🔻</p>
		</div>
		<div class="truck-wrapper">
			<div class="truck-container">
				<img src="media/site_design_imgs/truck.svg" alt="Truck Graphic" class="truck-svg">
				<a href="mystery/mystery.html" class="mew-link">
					<img src="media/site_design_imgs/mew.svg" alt="Mew Graphic">
				</a>
				<a href="credits/credits.html" class="credits">Credits</a>
			</div>
		</div>
	</section>

	<section id="grass-transition">
		<div class="grass-div">
			<img src="media/site_design_imgs/grass.svg" alt="Grass Vector Art">
		</div>
	</section>

	<section id="products">
		<div class="main-content">
			<h1 class="page-title">Products</h1>
			<div class="filter-bar">
				<div class="filters">
					<span>Filter:</span>
					<div id="myMultiselect" class="multiselect">
						<div id="mySelectLabel" class="selectBox" onclick="toggleCheckboxArea()">
							<span id="selectedFilterText">Nothing is selected</span>
						</div>
						<div id="mySelectOptions">
							<label for="sort-asc">
								<input type="checkbox" id="sort-asc" value="name-asc" data-group="sort">
								Alphabetize (A - Z)
							</label>
							<label for="sort-desc">
								<input type="checkbox" id="sort-desc" value="name-desc" data-group="sort">
								Alphabetize (Z - A)
							</label>
							<label for="price-low">
								<input type="checkbox" id="price-low" value="price-asc" data-group="sort">
								Price (Low - High)
							</label>
							<label for="price-high">
								<input type="checkbox" id="price-high" value="price-desc" data-group="sort">
								Price (High - Low)
							</label>
						</div>
					</div>
				</div>
				<div class="item-count" id="item-count">0 items</div>
			</div>
		</div>
		<div id="product-gallery" class="product-gallery"></div>
	</section>
</body>
</html>
