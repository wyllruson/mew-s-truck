name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write Supabase client config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > public/assets/scripts/config/supabase-config.js <<EOF
          window.MEW_SUPABASE = {
            url: '${SUPABASE_URL}',
            anonKey: '${SUPABASE_ANON_KEY}',
          };
          EOF

      - name: Set GitHub Pages base path
        run: |
          BASE_PATH="/${{ github.event.repository.name }}"
          node -e "
          const fs = require('fs');
          const file = 'public/assets/scripts/config/site-config.js';
          let src = fs.readFileSync(file, 'utf8');
          src = src.replace(/basePath:\\s*'[^']*'/, \"basePath: '${BASE_PATH}'\");
          fs.writeFileSync(file, src);
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4
        id: deployment
