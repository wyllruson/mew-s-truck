<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>
			Mew's Truck
		</title>
		<meta name="description" content="The site is a Pokemon card shop. We sell various Pokemon card products including
		boxes, packs, individual cards, and more. We also have a feature that allows users to
		buy a mystery pack once a week with a chance to get a rare card.">
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="signup.css">
		<link href='https://fonts.googleapis.com/css?family=Silkscreen' rel='stylesheet'>
		<script src="https://kit.fontawesome.com/55e841592a.js" crossorigin="anonymous">
		</script>
		<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js">
		</script>
		<script src="../topbar/loggedin.js">
		</script>
		<script src="../products/main_product_page.js">
		</script>
	</head>
	<body>
		<!-- Header -->
		<header id="header">
			<div class="top-row">
				<!-- Logo Section -->
				<div class="logo">
					<a href="../index.html">
						<img src="../media/site_design_imgs/logo.png" alt="Logo">
					</a>
				</div>
				<!-- Center Navigation Links -->
				<div class="nav-links">
					<a href="../index.html#products">
						Products
					</a>
					<a href="../mystery/mystery.html">
						Mystery Shop
					</a>
					<a href="../about/about.html">
						About
					</a>
					<a href="../service/service.html">
						Service
					</a>
				</div>
				<!-- Right Side Links -->
				<div class="right-links">
					<a href="../cart/cart.html" 
               onmouseover="this.querySelector('i').classList.add('fa-bounce')"
               onmouseout="this.querySelector('i').classList.remove('fa-bounce')">
               <i class="fa-solid fa-cart-shopping fa-xl"></i>
            </a>
					<a href="../account/login.html" id="login-link">
						<i class="fa-solid fa-user fa-xl">
						</i>
						<span>
							Login
						</span>
					</a>
				</div>
			</div>
		</header>
		<div class="popup-box">
			<h3>
				Sign up
			</h3>
			<form class="login-form" action="/signup" method="POST">
				<div class="form-group">
					<label for="username">
						Username
					</label>
					<input type="text" id="username" name="username" placeholder="Enter your username"
					required>
				</div>
				<div class="form-group">
					<label for="email">
						Email
					</label>
					<input type="email" id="email" name="email" placeholder="Enter your Email"
					required>
				</div>
				<div class="form-group">
					<label for="password">
						Password
					</label>
					<input type="password" id="password" name="password" placeholder="Enter your password"
					required minlength="8">
				</div>
				<div class="form-group">
					<label for="confirm_password">
						Confirm your password
					</label>
					<input type="password" id="confirm_password" name="confirm_password" placeholder="Enter your password again"
					required>
				</div>
				<div id="error-message" style="color: red; display: none;">
				</div>
				<div class="form-buttons">
					<button type="submit" class="signup-btn">
						Sign up
					</button>
					<button type="button" class="back-btn" onclick="window.location.href='../account/login.html';">
						back
					</button>
				</div>
			</form>
			<script>
				document.querySelector('.signup-form').addEventListener('submit', async(e) => {
					e.preventDefault();

					const response = await fetch('/signup', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({
							username: document.getElementById('username').value,
							email: document.getElementById('email').value,
							password: document.getElementById('password').value,
							confirm_password: document.getElementById('confirm_password').value
						})
					});

					if (response.ok) {
						window.location.href = '/account/login.html';
					} else {
						const data = await response.json();
						alert(data.error);
					}
				});
			</script>
		</div>
	</body>

</html>
